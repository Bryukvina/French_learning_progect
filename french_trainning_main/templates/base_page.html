<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block pagetitle %}{% endblock %}</title>
    <!-- load static -->
    {% load static %}
    <!-- CSS -->
    <link href="{% static 'bootstrap.min.css' %}" rel="stylesheet">
    <!-- Дополнительные стили для фона -->
    <style>
        #title-box {
            background-image: url('https://www.architime.ru/specarch/gustave_eiffel/3.jpg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            position: relative;
            color: white;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
            border-radius: 15px;
            overflow: hidden;
        }
        
        /* Затемнение фона для лучшей читаемости текста */
        #title-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4); /* Полупрозрачное затемнение */
            z-index: 1;
        }
        
        #title-box .container-fluid {
            position: relative;
            z-index: 2;
        }
        
        /* Адаптация текста для лучшей читаемости */
        #title-box h1,
        #title-box p {
            color: white;
            text-shadow: 2px 2px 8px rgba(0,0,0,0.8);
        }
        
        #title-box p {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 15px;
            border-radius: 10px;
            display: inline-block;
        }
    </style>
</head>
<body>
<main>
    <div class="container">
        <header class="border-bottom">
            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-dark text-decoration-none">
                <div class="fs-2 mb-3">
                    <img src="{% static 'calculator.svg' %}" alt="French learning simulator" width="32" height="32"/>
                    <span>French learning simulator</span>
                </div>
            </a>
        </header>
        
        <div class="p-5 mb-4 rounded-3" id="title-box">
            <div class="container-fluid py-5">
                <h1 class="display-1 fw-bold">{% block page-title %}{% endblock %}</h1>
                <p class="col-md-8 fs-4">{% block page-lead %}{% endblock %}</p>
            </div>
        </div>
        {% block content %}{% endblock %}
        <footer class="footer pt-3 mt-4 text-muted border-top">© Bryukvina Darja</footer>
    </div>
</main>
</body>
</html>
